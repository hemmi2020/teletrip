<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/images/dashboard.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telitrip</title>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Inter — closest free match to Apfel Grotesk (geometric grotesque, fintech-grade) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /*
     * Apfel Grotesk typography system
     * Primary: "Apfel Grotezk" (if available/self-hosted)
     * Fallback: Inter → system UI stack
     */
    :root {
      --font-primary: "Apfel Grotezk", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-weight-regular: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;
    }

    /* Apply globally */
    *, *::before, *::after { box-sizing: border-box; }

    html {
      font-family: var(--font-primary);
      font-weight: var(--font-weight-regular);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      font-family: var(--font-primary);
      font-weight: 400;
      line-height: 1.6;
      color: #111827;
    }

    /* Typography hierarchy */
    h1, h2, h3 {
      font-family: var(--font-primary);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    h4, h5, h6 {
      font-family: var(--font-primary);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }
    p, li, span, label, input, select, textarea, button {
      font-family: var(--font-primary);
    }
    button {
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    /* Small UI text */
    small, .text-xs, .text-sm {
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
